<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Carillon — TowerBells</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="/static/styles.css?v=20260719o" />
</head>
<body class="detail-page">
  <header class="detail-header">
    <div class="detail-header-links">
      <a href="/" class="back-link">← Back to map</a>
      <div class="header-actions">
        <a
          id="legacyLink"
          class="legacy-badge hidden"
          href="#"
          target="_blank"
          rel="noopener noreferrer"
          aria-hidden="true"
        >Old Towerbells Page</a>
        <a id="editLink" class="edit-link" href="#">Edit data</a>
      </div>
    </div>
    <div class="detail-title-block">
      <div class="detail-title-main">
        <h1 id="title">Loading…</h1>
        <p id="titleTranslation" class="detail-title-translation hidden" aria-hidden="true"></p>
        <p id="subtitle"></p>
      </div>
      <span id="titleBadge" class="detail-badge hidden" aria-hidden="true"></span>
    </div>
  </header>
  <div class="detail-body">
    <section class="detail-top-row">
      <div class="detail-location-panel" id="locationPanel"></div>
      <div class="detail-map-panel">
        <button type="button" id="mapExpandBtn" class="map-expand-btn" aria-label="Expand map to full screen" title="Expand map">
          <svg class="map-expand-icon" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true" focusable="false">
            <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
          </svg>
        </button>
        <div id="miniMap" class="mini-map"></div>
      </div>
    </section>
    <div class="detail-main" id="detailContent"></div>
  </div>
  <div id="mapFullscreen" class="map-fullscreen hidden" aria-hidden="true">
    <div class="map-fullscreen-toolbar">
      <button type="button" id="mapCloseBtn" class="map-fullscreen-close">Close</button>
    </div>
    <div id="fullMap" class="full-map"></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="/static/site-config.js?v=20260719a"></script>
  <script src="/static/filters.js?v=20260719b"></script>
  <script src="/static/detail.js?v=20260719n"></script>
</body>
</html>
